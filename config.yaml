# Ceph RADOS Configuration
ceph:
  config_file: /etc/ceph/ceph.conf
  client_name: client.admin
  cluster_name: ceph
  pool_name: testpool

# Embedding Configuration
embedding:
  provider: sentence-transformers  # Options: sentence-transformers, openai
  model: all-MiniLM-L6-v2
  # Alternative models:
  # - all-mpnet-base-v2 (768 dims, better quality, slower)
  # - paraphrase-multilingual-MiniLM-L12-v2 (multilingual support)
  device: cpu  # Options: cpu, cuda
  batch_size: 32
  normalize_embeddings: true
  
  # OpenAI configuration (when provider: openai)
  # openai_api_key: ${OPENAI_API_KEY}
  # openai_model: phi3.5:latest

# Vector Database Configuration (RADOS xattr backend)
vectordb:
  type: rados_xattr
  embedding_dim: 384  # Match the embedding model (all-MiniLM-L6-v2 = 384)
  
# LLM Configuration (for agent and natural language interface)
llm:
  # Agent configuration
  agent_enabled: true  # Enable natural language agent
  provider: ollama  # Options: ollama, openai
  model: qwen3.5:9b
  temperature: 0.1  # Lower = more focused, higher = more creative
  max_tokens: 2000
  
  # Ollama configuration
  ollama_host: http://localhost:11434
  
  # OpenAI configuration (when provider: openai)
  # openai_api_key: ${OPENAI_API_KEY}
  
  # Legacy summarization config (for future use)
  summarization_enabled: false
  max_summary_length: 200
  keywords_enabled: false
  max_keywords: 10

# Autonomous Agent Configuration
agent:
  # ReAct reasoning loop
  use_react_loop: true          # Enable multi-step ReAct reasoning
  max_iterations: 10            # Max reasoning steps per query
  max_session_time: 120         # Max seconds per agent session

  # Safety and approval
  dry_run: false                # Log actions without executing
  require_confirmation: true    # Require user confirmation for destructive ops
  auto_approve_level: low       # Auto-approve actions at or below this risk: low, medium, high
  max_actions_per_session: 20   # Rate limit for safety

  # Anomaly detection thresholds
  anomaly:
    osd_utilization_warn: 75    # OSD usage % warning threshold
    osd_utilization_crit: 85    # OSD usage % critical threshold
    cluster_utilization_warn: 70
    cluster_utilization_crit: 80
    min_pgs_per_osd: 30
    max_pgs_per_osd: 300
    capacity_warning_days: 30   # Days until full at current growth
    capacity_critical_days: 14

# Indexing Configuration
indexing:
  # Content processing
  max_file_size_mb: 100
  chunk_size: 1000  # Characters per chunk for large files
  chunk_overlap: 200  # Overlap between chunks
  
  # File type support
  supported_extensions:
    - txt
    - md
    - py
    - js
    - java
    - cpp
    - c
    - h
    - json
    - yaml
    - yml
    - xml
    - csv
    - log
    - sh
    - bash
    - rst
    - tex
  
  # Text extraction
  encoding_detection: true
  fallback_encoding: utf-8
  
  # Performance
  batch_size: 10
  parallel_processing: false  # Enable for large-scale indexing

# Search Configuration
search:
  default_top_k: 10
  max_top_k: 100
  min_relevance_score: 0.0  # Minimum cosine similarity (0-1)
  include_content_preview: true
  preview_length: 500

# Watcher Configuration
watcher:
  poll_interval_seconds: 60
  enable_daemon: false
  log_file: ./watcher.log

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: ./semantic_storage.log

# Performance and caching
cache:
  enable_embedding_cache: true
  cache_directory: ./cache
  max_cache_size_mb: 1000
